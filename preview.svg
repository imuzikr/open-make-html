    <rect x="490" y="377" width="48" height="4" rx="2" fill="#dedad2"/>
    <rect x="490" y="385" width="62" height="3" rx="1.5" fill="#eceae4"/>
    <rect x="490" y="392" width="54" height="3" rx="1.5" fill="#eceae4"/>
    <rect x="490" y="399" width="44" height="3" rx="1.5" fill="#eceae4"/>

    <!-- prototype -->
    <rect x="587" y="346" width="101" height="68" rx="7" fill="#ffffff" stroke="#dedad2" stroke-width="1"/>
    <rect x="587" y="346" width="101" height="22" rx="7" fill="#eceae4"/>
    <rect x="587" y="360" width="101" height="8"  fill="#eceae4"/>
    <text x="637" y="362" text-anchor="middle" font-size="9" font-weight="600" fill="#6b6a63"
