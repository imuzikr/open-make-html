    <rect x="601" y="377" width="48" height="4" rx="2" fill="#dedad2"/>
    <rect x="601" y="385" width="62" height="3" rx="1.5" fill="#eceae4"/>
    <rect x="601" y="392" width="54" height="3" rx="1.5" fill="#eceae4"/>
