<svg width="720" height="440" viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="win"><rect width="720" height="440" rx="12"/></clipPath>
  </defs>

  <!-- Outer shadow layer -->
